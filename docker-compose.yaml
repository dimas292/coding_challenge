services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coding_challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aduhai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coding_challenge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4444:4444"
    volumes:
      - ./backend/config.docker.yml:/app/config.yml:ro

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"

volumes:
  postgres_data:
